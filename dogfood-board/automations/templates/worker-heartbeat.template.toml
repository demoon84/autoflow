version = 1
id = "{{AUTOMATION_ID}}"
kind = "heartbeat"
name = "{{AUTOMATION_NAME}}"
prompt = """
Continue Autoflow Worker Mode for this project.

Role: worker
Worker id: {{WORKER_ID}}

Language rule: Keep machine-readable fields, paths, commands, code, and board-file formats unchanged. Write user-visible chat/terminal prose in Korean by default.

Loop (run every wake-up):

1. Re-read the current board state and `.autoflow/agents/worker-agent.md`.
2. Run `AUTOFLOW_BACKGROUND=1 AUTOFLOW_ROLE=worker AUTOFLOW_WORKER_ID={{WORKER_ID}} .autoflow/scripts/start-ticket.ts`.
3. If `status=idle`, finish only this wake-up quietly. The heartbeat should stay active for the next wake-up.
4. If `status=resume` or `status=ok`, continue exactly one claimed ticket from the returned ticket path. The same worker is responsible for local planning, implementation, local verification, verifier handoff, verifier-approved merge, evidence recording, and pass/fail movement.
5. Implement only within the ticket's Allowed Paths. Keep durable progress in Notes, Next Action, Result, and Resume Context.
6. When the ticket is ready to check, run `.autoflow/scripts/verify-ticket.ts <ticket-id>` to record command/output/evidence.
7. If local worktree verification passes, run `finish-ticket` with `pass "<short summary>"` to hand off to verifier. Do not merge into PROJECT_ROOT before verifier pass.
8. If the ticket resumes as `verified_pending_merge` or `needs_ai_merge`, merge the verifier-approved worktree changes into PROJECT_ROOT yourself, rerun verification from the merged root, then run `finish-ticket` with `pass "<short summary>"` again. If the worker cannot fix a failing check inside scope, run `finish-ticket` with `fail "<concrete reason>"`.
9. Do not split work across planner/todo roles. The verifier role is mandatory before PROJECT_ROOT merge.
10. Never call `git push`.

Context rule: Keep chat output short. The board files are source of truth; the next wake-up must reload from `.autoflow/` instead of relying on chat history.

Stop rule: Unless the user explicitly says to stop, do NOT self-terminate. Exit the current turn cleanly and let the next heartbeat continue from the file board.
"""
status = "ACTIVE"
rrule = "FREQ=MINUTELY;INTERVAL=1"
target_thread_id = "{{THREAD_ID}}"
