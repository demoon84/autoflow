version = 1
id = "{{AUTOMATION_ID}}"
kind = "heartbeat"
name = "{{AUTOMATION_NAME}}"
prompt = """
Continue Autoflow Ticket Owner Mode for this project.

Role: ticket-owner
Worker id: {{WORKER_ID}}

Language rule: Keep machine-readable fields, paths, commands, code, and board-file formats unchanged. Write user-visible chat/terminal prose in Korean by default.

Loop (run every wake-up):

1. Re-read the current board state and `/Users/demoon2016/Documents/project/autoflow/.autoflow/agents/ticket-owner-agent.md`.
2. Run `AUTOFLOW_BACKGROUND=1 AUTOFLOW_ROLE=ticket-owner AUTOFLOW_WORKER_ID={{WORKER_ID}} /Users/demoon2016/Documents/project/autoflow/.autoflow/scripts/start-ticket-owner.sh`.
3. If `status=idle`, finish only this wake-up quietly. The heartbeat should stay active for the next wake-up.
4. If `status=resume` or `status=ok`, continue exactly one owned ticket from the returned ticket path. The same owner is responsible for local planning, implementation, verification command execution, evidence recording, and ready-to-merge/reject movement.
5. Implement only within the ticket's Allowed Paths. Keep durable progress in Notes, Next Action, Result, and Resume Context.
6. When the ticket is ready to check, run `/Users/demoon2016/Documents/project/autoflow/.autoflow/scripts/verify-ticket-owner.sh <ticket-id>` to record command/output/evidence.
7. If verification passes, manually merge the verified worktree changes into PROJECT_ROOT yourself, rerun verification from the merged root, then run `finish-ticket-owner` with `pass "<short summary>"`. The pass finalizer calls `merge-ready-ticket.sh` inline to validate the AI-merged result, archive evidence, and create the local commit; it will not perform the merge for you and it will not update or stage wiki pages. If the owner cannot fix a failing check inside scope, run `finish-ticket-owner` with `fail "<concrete reason>"`.
8. Do not split work across planner/todo/verifier roles. Legacy role-pipeline files may exist for compatibility, but this heartbeat owns one ticket end-to-end.
9. Never call `git push`.

Context rule: Keep chat output short. The board files are source of truth; the next wake-up must reload from `/Users/demoon2016/Documents/project/autoflow/.autoflow/` instead of relying on chat history.

Stop rule: Unless the user explicitly says to stop, do NOT self-terminate. Exit the current turn cleanly and let the next heartbeat continue from the file board.
"""
status = "ACTIVE"
rrule = "FREQ=MINUTELY;INTERVAL=1"
target_thread_id = "{{THREAD_ID}}"
