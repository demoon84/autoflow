<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Autoflow app icon</title>
  <desc id="desc">A desktop app icon showing calm wave-like automation flow.</desc>
  <defs>
    <linearGradient id="wave" x1="208" y1="338" x2="822" y2="704" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffbf54"/>
      <stop offset="0.35" stop-color="#58ddc1"/>
      <stop offset="0.68" stop-color="#3cc5cf"/>
      <stop offset="1" stop-color="#8db4ff"/>
    </linearGradient>
    <linearGradient id="foam" x1="248" y1="412" x2="766" y2="612" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff8e6"/>
      <stop offset="1" stop-color="#eefcf5"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1024" height="1024" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="32" stdDeviation="38" flood-color="#0d2d35" flood-opacity="0.18"/>
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0d2d35" flood-opacity="0.13"/>
    </filter>
    <filter id="glow" x="70" y="70" width="884" height="884" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" rx="232" fill="#ffffff"/>
  <rect x="18" y="18" width="988" height="988" rx="218" fill="none" stroke="#e8f0ee" stroke-width="36"/>
  <path d="M158 722c170 104 310-108 506-38 104 38 184 30 244-12" fill="none" stroke="#58ddc1" stroke-width="118" stroke-linecap="round" opacity="0.11" filter="url(#glow)"/>
  <path d="M156 372c122-82 222-26 322 22 132 64 238 40 390-96" fill="none" stroke="#8db4ff" stroke-width="116" stroke-linecap="round" opacity="0.09" filter="url(#glow)"/>

  <g filter="url(#shadow)">
    <path d="M190 564c118-152 258-168 420-40 86 68 160 78 248 16" fill="none" stroke="url(#wave)" stroke-width="150" stroke-linecap="round"/>
    <path d="M206 474c94-88 204-102 324-12 116 88 220 94 342-4" fill="none" stroke="url(#foam)" stroke-width="74" stroke-linecap="round"/>
    <path d="M276 640c112-82 228-80 348 8 90 66 164 58 238-2" fill="none" stroke="#46d8bd" stroke-width="46" stroke-linecap="round" opacity="0.78"/>
    <path d="M258 382c92-52 186-38 282 44 96 82 204 78 316-12" fill="none" stroke="#ffbf54" stroke-width="34" stroke-linecap="round" opacity="0.76"/>
  </g>
</svg>
