format = 1
kind = "autoflow_heartbeat_set"
set_name = "Autoflow Default Set"
target_thread_id = "REPLACE_WITH_TARGET_THREAD_ID"
board_root = "autoflow/"

planner_workers = ["plan-1"]
todo_workers = ["todo-1"]
verifier_workers = ["verify-1"]

# execution_pool is the list of todo worker ids that can pick up work.
# Todo worker handles claim AND implementation together.
execution_pool = "todo-1"
verifier_pool = "verify-1"
max_execution_load_per_worker = 1

plan_template = "automations/templates/plan-heartbeat.template.toml"
todo_template = "automations/templates/todo-heartbeat.template.toml"
verifier_template = "automations/templates/verifier-heartbeat.template.toml"

# Per-worker Codex thread_id override. Each entry binds one worker to one
# conversation. Workers not listed here fall back to the top-level
# target_thread_id. Values starting with REPLACE_WITH_ are treated as
# missing at render time.
[thread_ids]
plan-1 = "REPLACE_WITH_PLAN_1_THREAD_ID"
todo-1 = "REPLACE_WITH_TODO_1_THREAD_ID"
verify-1 = "REPLACE_WITH_VERIFY_1_THREAD_ID"

[notes]
edit_before_render = "Replace target_thread_id (fallback) and each [thread_ids] entry with real Codex thread ids before running autoflow render-heartbeats."
scaling_rule = "Scale by editing worker arrays, pool strings, and [thread_ids] entries — not by changing runtime code."
single_thread_mode = "If all workers should share one Codex thread, leave [thread_ids] empty and set only target_thread_id."
trigger_rule = "`#plan`, `#todo`, `#veri` should create or resume these 1-minute heartbeats and keep them active until the user explicitly says stop."
