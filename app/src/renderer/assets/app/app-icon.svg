<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Autoflow app icon</title>
  <desc id="desc">A desktop app icon showing calm wave-like automation flow.</desc>
  <defs>
    <linearGradient id="wave" x1="262" y1="394" x2="770" y2="662" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffbf54"/>
      <stop offset="0.35" stop-color="#58ddc1"/>
      <stop offset="0.68" stop-color="#3cc5cf"/>
      <stop offset="1" stop-color="#8db4ff"/>
    </linearGradient>
    <linearGradient id="foam" x1="300" y1="446" x2="724" y2="592" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fff8e6"/>
      <stop offset="1" stop-color="#eefcf5"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1024" height="1024" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#0d2d35" flood-opacity="0.16"/>
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0d2d35" flood-opacity="0.12"/>
    </filter>
    <filter id="glow" x="70" y="70" width="884" height="884" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="72" y="72" width="880" height="880" rx="198" fill="#ffffff"/>
    <rect x="92" y="92" width="840" height="840" rx="178" fill="none" stroke="#e8f0ee" stroke-width="30"/>
  </g>
  <path d="M246 672c132 80 242-84 394-30 80 30 142 24 188-8" fill="none" stroke="#58ddc1" stroke-width="88" stroke-linecap="round" opacity="0.11" filter="url(#glow)"/>
  <path d="M246 400c94-62 172-20 248 16 102 50 184 32 302-74" fill="none" stroke="#8db4ff" stroke-width="86" stroke-linecap="round" opacity="0.09" filter="url(#glow)"/>

  <g filter="url(#shadow)">
    <path d="M262 568c92-120 202-132 330-32 66 54 124 62 194 14" fill="none" stroke="url(#wave)" stroke-width="116" stroke-linecap="round"/>
    <path d="M274 498c74-70 160-80 254-10 90 70 172 74 268-4" fill="none" stroke="url(#foam)" stroke-width="58" stroke-linecap="round"/>
    <path d="M328 626c88-64 178-62 272 6 70 52 128 46 186-2" fill="none" stroke="#46d8bd" stroke-width="36" stroke-linecap="round" opacity="0.78"/>
    <path d="M314 426c72-40 146-30 220 34 76 64 160 60 248-10" fill="none" stroke="#ffbf54" stroke-width="28" stroke-linecap="round" opacity="0.76"/>
  </g>
</svg>
