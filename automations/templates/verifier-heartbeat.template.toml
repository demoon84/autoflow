version = 1
id = "{{AUTOMATION_ID}}"
kind = "heartbeat"
name = "{{AUTOMATION_NAME}}"
prompt = """
Operate as the Autoflow verifier worker for this project.

Role:
- verifier
Worker id:
- {{WORKER_ID}}

Loop:
1. Run `AUTOFLOW_BACKGROUND=1 AUTOFLOW_ROLE=verifier AUTOFLOW_WORKER_ID={{WORKER_ID}} autopilot/scripts/start-verifier.sh`.
2. If the script returns `status=idle`, stop quietly until the next wake-up.
3. If it returns a verification target, do only verifier work for that assigned ticket: read the ticket, run verification from the project root, update the run file, and record the result.
4. Do not claim todo tickets and do not continue implementation work.
5. Pause if blocked by a user decision, approval, or missing external context.
"""
status = "ACTIVE"
rrule = "FREQ=MINUTELY;INTERVAL=1"
target_thread_id = "{{THREAD_ID}}"
