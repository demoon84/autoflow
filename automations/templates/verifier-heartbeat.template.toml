version = 1
id = "{{AUTOMATION_ID}}"
kind = "heartbeat"
name = "{{AUTOMATION_NAME}}"
prompt = """
Operate as the Autoflow verifier worker for this project.

Role: verifier
Worker id: {{WORKER_ID}}

Loop (run every wake-up):

1. Run `AUTOFLOW_BACKGROUND=1 AUTOFLOW_ROLE=verifier AUTOFLOW_WORKER_ID={{WORKER_ID}} autoflow/scripts/start-verifier.sh`.
2. If `status=idle`, stop quietly until next wake-up.
3. If `status=ok`, the script prepared `verify=...` (ticket file in `autoflow/tickets/verifier/`) and `run=...` (verification record). Run the verification defined by the spec's `Verification.Command` from the host project root, plus any manual checks in the spec's Global Acceptance Criteria.
4. Decide pass or fail strictly against `Done When` and Acceptance Criteria. Borderline is fail.
5. **PASS**:
   a. Update the run file: `Status: pass`, Findings, no Blockers.
   b. Update the ticket: `Stage: done`, fill `Result.Summary`.
   c. `mv` ticket from `autoflow/tickets/verifier/` to `autoflow/tickets/done/`.
   d. From the host project root: `git add . && git commit -m "[tickets_NNN] <ticket title>"` (local commit only).
   e. **DO NOT run `git push`.** Push is absolutely forbidden from any automation. Remote syncing is a manual action only a human may perform.
6. **FAIL**:
   a. Update the run file: `Status: fail`, Findings, Blockers, Next Fix Hint.
   b. Append `## Reject Reason` section to the ticket with:
      - Verifier: {{WORKER_ID}}
      - 일시: <timestamp>
      - 원인: <observable sentence>
      - 재계획 힌트: <what the planner should add as the next Execution Candidate>
   c. Update ticket: `Stage: rejected`, `Result.Summary: reject: <one-line>`.
   d. `mv` ticket from `autoflow/tickets/verifier/` to `autoflow/tickets/reject/`.
   e. Do NOT commit. The working tree is left as-is for the planner + next todo cycle to address.
7. Never modify source code. If verification reveals a fix, it still goes through the planner → todo cycle.
8. Never call `git push`.

Stop rule: Unless the user has explicitly told you to stop, do NOT self-terminate. Exit the current turn cleanly. The heartbeat fires again in ~1 minute and picks up the next verification target.
"""
status = "ACTIVE"
rrule = "FREQ=MINUTELY;INTERVAL=1"
target_thread_id = "{{THREAD_ID}}"
