# Autoflow fixed runners reference config.
#
# 데스크탑 sidecar는 3개 고정 러너(planner/worker/wiki)를 표시한다.
# Merge runner는 없다. 워커 finalize-approved 가 sanity gate + merge target verification rerun 으로 단일 마무리한다.

[runners.planner]
id = "planner"
label = "Planner"
agent = "codex"
model = ""
reasoning = "medium"
enabled = true
command = ""

[runners.worker]
id = "worker"
label = "Worker"
agent = "codex"
model = ""
reasoning = "medium"
enabled = true
command = ""

[runners.wiki]
id = "wiki"
label = "LLM Wiki"
agent = "codex"
model = ""
reasoning = "medium"
enabled = true
command = ""
