format = 1

[install]
default_board_dir = ".autoflow"

[sources.board]
path = "install/board"
target = "{{BOARD_ROOT}}"
type = "board"
overwrite = "upgrade"
template = false
skip_shell = true

# 정적 템플릿 / agent prompt / 계약 / 규칙 / 상태 schema.
# 기본값은 active core의 install/share를 직접 참조한다.
# AUTOFLOW_SHARE_ROOT를 지정한 경우에만 별도 share root로 동기화한다.
[sources.share]
path = "install/share"
target = "{{USER_SHARE_ROOT}}"
type = "user_share"
overwrite = "upgrade"
template = false
skip_shell = true

[sources.host]
path = "install/host/AGENTS.md"
target = "AGENTS.md"
type = "host"
overwrite = "never"
template = true

[sources.host_claude]
path = "install/host/CLAUDE.md"
target = "CLAUDE.md"
type = "host"
overwrite = "never"
template = true

[sources.claude_skills]
path = "install/integrations/claude/skills"
target = "{{CLAUDE_HOME}}/skills"
type = "user_home"
overwrite = "upgrade"
template = true

[sources.claude_plugin]
path = "install/integrations/claude/plugin"
target = ".claude/autoflow-plugin"
type = "host"
overwrite = "upgrade"
template = true

[sources.codex_skills]
path = "install/integrations/codex/skills"
target = "{{CODEX_HOME}}/skills"
type = "user_home"
overwrite = "upgrade"
template = true

# 런타임 스크립트는 보드에 설치하지 않는다. 실행 코드는 resolved Autoflow
# core의 `app/runtime/`에 있고, CLI가 `BOARD_ROOT` / `PROJECT_ROOT`
# 환경변수로 대상 보드를 가리키며 호출한다. 보드는 데이터(`tickets`,
# `runners/state`, `metrics`, `conversations`), markdown 위키와 raw source,
# 그리고 설치 시 생성되는 `manifest.toml` core/share 참조만 가진다.
