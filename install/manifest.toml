format = 1

[install]
default_board_dir = ".autoflow"

[sources.board]
path = "install/board"
target = "{{BOARD_ROOT}}"
type = "board"
overwrite = "upgrade"
template = false
skip_shell = true

# Static templates / agent prompts / contracts / rules / sqlite schema.
# Identical across every project, so they live once at the user-scope share
# root (default ~/.autoflow/share, overridable via AUTOFLOW_SHARE_ROOT) instead
# of being copied into each board.
[sources.share]
path = "install/share"
target = "{{USER_SHARE_ROOT}}"
type = "user_share"
overwrite = "upgrade"
template = false
skip_shell = true

[sources.host]
path = "install/host/AGENTS.md"
target = "AGENTS.md"
type = "host"
overwrite = "never"
template = true

[sources.host_claude]
path = "install/host/CLAUDE.md"
target = "CLAUDE.md"
type = "host"
overwrite = "never"
template = true

[sources.claude_skills]
path = "install/integrations/claude/skills"
target = ".claude/skills"
type = "host"
overwrite = "upgrade"
template = true

[sources.claude_plugin]
path = "install/integrations/claude/plugin"
target = ".claude/autoflow-plugin"
type = "host"
overwrite = "upgrade"
template = true

[sources.claude_plugin_skills]
path = "install/integrations/claude/skills"
target = ".claude/autoflow-plugin/skills"
type = "host"
overwrite = "upgrade"
template = true

[sources.codex_skills]
path = "install/integrations/codex/skills"
target = ".codex/skills"
type = "host"
overwrite = "upgrade"
template = true

# 런타임 스크립트는 보드에 설치하지 않는다. 실행 코드는 `app/runtime/`에 있고,
# 앱 또는 host repo의 CLI가 `BOARD_ROOT` / `PROJECT_ROOT` 환경변수로 대상 보드를
# 가리키며 호출한다. 보드는 데이터(`tickets`, `runners/state`,
# `metrics`, `conversations`)와 DB-only 위키 인덱스 상태만 가진다.
