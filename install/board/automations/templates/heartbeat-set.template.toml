format = 1
kind = "autoflow_heartbeat_set"
set_name = "{{SET_NAME}}"
target_thread_id = "{{THREAD_ID}}"
board_root = "{{BOARD_DIR}}/"

# Four-runner topology: planner + worker + verifier + wiki.
# The planner runner processes order/retry/prd into todo. The worker runner claims todo and runs
# implementation and local verification. The verifier runner checks semantic fit.
# The wiki runner periodically inspects done/retry/log sources and calls wiki update only when content changes.
# Path-disjoint set so concurrent ticks never produce merge conflicts.
worker_runners = ["worker"]
planner_workers = ["planner"]
wiki_workers = ["wiki"]
verifier_workers = ["verifier"]

# Legacy role-pipeline workers. Keep these empty for the default
# 4-runner topology. Populate only if you intentionally opt into the
# legacy todo pipeline. Merge remains worker-runner owned.
todo_workers = []
merge_workers = []

execution_pool = ""
verifier_pool = ""
max_execution_load_per_worker = 1

worker_template = "automations/templates/worker-heartbeat.template.toml"
plan_template = "automations/templates/plan-heartbeat.template.toml"
todo_template = "automations/templates/todo-heartbeat.template.toml"
verifier_template = "automations/templates/verifier-heartbeat.template.toml"

# Per-worker Codex thread_id override. A worker present here is rendered with
# its own target_thread_id. Workers without an entry fall back to the
# top-level target_thread_id above.
[thread_ids]
planner = "{{PLANNER_THREAD_ID}}"
worker = "{{WORKER_THREAD_ID}}"
verifier = "{{VERIFIER_THREAD_ID}}"
wiki = "{{WIKI_THREAD_ID}}"

[notes]
topology_rule = "Four-runner model: planner_workers=[\"planner\"], worker_runners=[\"worker\"], verifier_workers=[\"verifier\"], wiki_workers=[\"wiki\"]. Scale only after profiling shows the pipeline is starved."
idle_rule = "Always-on workers should use AUTOFLOW_BACKGROUND=1 so empty wake-ups return status=idle."
worker_rule = "Every live worker id should be unique. The worker runner owns one active ticket end-to-end, including verifier-approved PROJECT_ROOT merge."
thread_binding_rule = "One conversation per worker: fill every [thread_ids] entry with a unique Codex thread id. Shared mode: leave [thread_ids] empty and set target_thread_id only."
trigger_rule = "All four heartbeats should keep running until the user explicitly says stop."
wiki_rule = "The wiki runner owns wiki updates. The worker runner does not call autoflow wiki update or stage .autoflow/wiki during ticket completion; wiki inspects source changes and calls autoflow wiki update only for material baseline drift, with check-only state in runners/state/wiki-baseline.history."
legacy_rule = "todo_workers are kept for role-pipeline compatibility; merge_workers must stay empty because verifier-approved merge is worker-runner owned."
