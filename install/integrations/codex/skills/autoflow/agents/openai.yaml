interface:
  display_name: "autoflow"
  short_description: "PRD-publishing Autoflow skill"
  default_prompt: "Use $autoflow as a read-only Autoflow skill. Read the project's current state and LLM Wiki, brief the user on what you found, get approval, then publish one or more PRD .md files. Do not perform research, design, implementation, verification, PRD branch/worktree creation, commit, merge, or wiki work yourself; delegate real work to assigned runners. Before approval, only read Autoflow board and wiki state and brief the first PRD turn."
