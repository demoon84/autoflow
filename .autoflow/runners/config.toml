# Autoflow runner configuration.
#
# Enabled four-runner topology:
#   planner : Orchestrator AI — backlog/PRD → todo, reject → todo
#               (auto-replan), and markdown recovery for stalled/blocked work.
#   worker   : Impl AI — todo → inprogress (worktree) → verify → merge → done.
#   verifier: Verifier AI — handles the compatibility verification lane and
#               may audit worker verification evidence without claiming the
#               worker's active inline ticket verification.
#   wiki    : Wiki AI — periodically refreshes .autoflow/wiki/ when
#               tickets/done or tickets/reject change. Path-disjoint from
#               Orchestrator AI and Impl AI so it never causes worktree/merge
#               conflicts.
# Wiki AI owns material baseline refresh and AI synthesis. Impl AI finalizers
# do not call update-wiki.sh or stage .autoflow/wiki/.
#
# Realtime (event-driven) wakeup: when AUTOFLOW_RUNNER_REALTIME_ENABLED=1
# (or per-role AUTOFLOW_<ROLE>_REALTIME_ENABLED=1), the loop sleep is broken
# early on watched-folder file changes:
#   planner : tickets/{inbox,backlog,reject}
#   worker  : tickets/todo (ticket public_role)
#   verifier: tickets/verifier
#   wiki    : tickets/done, wiki/ (debounced)
# In event-driven mode interval_seconds becomes the safety heartbeat — pick
# 1800s (30min) so reject auto-replan / blocked-dirty orchestration / adapter
# timeout still wakes periodically even with no file activity.

[[runners]]
id = "planner"
role = "planner"
agent = "claude"
model = "opus-1m"
reasoning = "high"
mode = "loop"
interval_seconds = 1800
enabled = true
command = ""

[[runners]]
id = "self-improve-1"
role = "self-improve"
agent = "shell"
model = ""
reasoning = ""
mode = "one-shot"
interval_seconds = 1800
enabled = false
max_duration_seconds = 10800
max_ticks = 6
command = ""

[[runners]]
id = "worker"
role = "ticket-owner"
agent = "codex"
model = "gpt-5.3-codex-spark"
reasoning = "low"
mode = "loop"
interval_seconds = 1800
enabled = true
command = ""

[[runners]]
id = "wiki"
role = "wiki-maintainer"
agent = "gemini"
model = "gemini-3-flash-preview"
reasoning = ""
mode = "loop"
interval_seconds = 1800
enabled = true
command = ""

[[runners]]
id = "verifier"
role = "verifier"
agent = "claude"
model = "sonnet-4.6"
reasoning = "medium"
mode = "loop"
interval_seconds = 1800
enabled = true
command = ""
