# Autoflow runner configuration — 3-runner topology.
#
#   planner : Orchestrator AI — order/PRD intake, todo creation.
#               Watches tickets/{inbox,backlog}.
#   worker  : Impl AI — claims todo, creates worktree, edits code, runs the
#               verify command, calls finish-ticket-owner.sh pass. The
#               finalizer's shell sanity gate (zero-diff + verify command
#               re-run) blocks false pass without a separate verifier.
#               worktree → master merge → worktree delete is one atomic
#               cycle inside the worker tick, so at most one worktree is
#               ever alive.
#   wiki    : Wiki AI — watches tickets/done + wiki/ for source change,
#               refreshes .autoflow/wiki/. .gitignore excludes
#               .autoflow/wiki/ (except curated skills/), so wiki never
#               creates a master commit and never causes dirty PROJECT_ROOT.
#
# monitor / verifier / self-improve runners are no longer part of Autoflow.
# Removed 2026-05-06 along with reject queue auto-replan; if a project needs
# an independent verification lane, re-add a [[runners]] block with role
# "verifier" or "monitor" — the role handlers in run-role.sh still exist.
#
# Realtime (event-driven) wakeup: when AUTOFLOW_RUNNER_REALTIME_ENABLED=1
# (or per-role AUTOFLOW_<ROLE>_REALTIME_ENABLED=1), the loop sleep is broken
# early on watched-folder file changes. interval_seconds is just a safety
# heartbeat — fs-watch handles the actual wakeups.

[[runners]]
id = "planner"
role = "planner"
agent = "claude"
model = "opus-1m"
reasoning = "high"
mode = "loop"
interval_seconds = 1800
enabled = true
realtime_enabled = true
command = ""

[[runners]]
id = "worker"
role = "ticket-owner"
agent = "codex"
model = "gpt-5.3-codex-spark"
reasoning = "low"
mode = "loop"
interval_seconds = 1800
enabled = true
realtime_enabled = true
command = ""

[[runners]]
id = "wiki"
role = "wiki-maintainer"
agent = "gemini"
model = "gemini-3-flash-preview"
reasoning = ""
mode = "loop"
interval_seconds = 1800
enabled = true
realtime_enabled = true
command = ""
