# Autoflow runner configuration.
#
# Default 3-runner topology (post 2026-05-06 simplification):
#   planner : Orchestrator AI — order/PRD intake, todo creation, recovery
#               decisions. Watches tickets/{inbox,backlog}.
#   worker  : Impl AI — claims todo, creates worktree, edits code, runs the
#               verify command, calls finish-ticket-owner.sh pass. The
#               finalizer's shell sanity gate (zero-diff + verify command
#               re-run) blocks false pass without a separate verifier.
#               worktree → master merge → worktree delete is one atomic
#               cycle inside the worker tick, so at most one worktree is
#               ever alive.
#   wiki    : Wiki AI — watches tickets/done + wiki/ for source change,
#               refreshes .autoflow/wiki/. .gitignore now excludes
#               .autoflow/wiki/ (except curated skills/), so wiki never
#               creates a master commit and never causes dirty PROJECT_ROOT.
#
# Removed from the default topology:
#   monitor : 1-minute interval that fired ~1440 LLM calls/day. Background
#               write paths are now .gitignore'd so dirty root is rare;
#               runner liveness is delegated to the OS supervisor (or to
#               planner's safety heartbeat self-check).
#   verifier: redundant once the worker finalizer enforces shell sanity
#               gate (zero-diff + verify command re-run + Allowed Paths
#               boundary). Both runners are kept in this file with
#               enabled=false so existing operators can re-enable
#               temporarily, but the default flow does not need them.
#
# Realtime (event-driven) wakeup: when AUTOFLOW_RUNNER_REALTIME_ENABLED=1
# (or per-role AUTOFLOW_<ROLE>_REALTIME_ENABLED=1), the loop sleep is broken
# early on watched-folder file changes:
#   planner : tickets/{inbox,backlog}
#   worker  : tickets/todo (ticket public_role)
#   wiki    : tickets/done, wiki/ (debounced)
# In event-driven mode interval_seconds is just a safety heartbeat — pick
# 1800s+ so adapter timeout / orphan worker recovery still wakes periodically
# even with no file activity. fs-watch handles the actual wakeups.

[[runners]]
id = "planner"
role = "planner"
agent = "claude"
model = "opus-1m"
reasoning = "high"
mode = "loop"
interval_seconds = 1800
enabled = true
realtime_enabled = true
command = ""

[[runners]]
id = "self-improve-1"
role = "self-improve"
agent = "shell"
model = ""
reasoning = ""
mode = "one-shot"
interval_seconds = 1800
enabled = false
realtime_enabled = false
max_duration_seconds = 10800
max_ticks = 6
command = ""

[[runners]]
id = "worker"
role = "ticket-owner"
agent = "codex"
model = "gpt-5.3-codex-spark"
reasoning = "low"
mode = "loop"
interval_seconds = 1800
enabled = true
realtime_enabled = true
command = ""

# Disabled in default 3-runner topology. Was firing every 60s with idle skip
# rarely engaging; produced ~1440 LLM calls/day with little signal once the
# .gitignore separation removed dirty-root false positives.
[[runners]]
id = "monitor"
role = "monitor"
agent = "gemini"
model = "gemini-3-flash-preview"
reasoning = ""
mode = "loop"
interval_seconds = 60
enabled = false
realtime_enabled = false
command = ""

[[runners]]
id = "wiki"
role = "wiki-maintainer"
agent = "gemini"
model = "gemini-3-flash-preview"
reasoning = ""
mode = "loop"
interval_seconds = 1800
enabled = true
realtime_enabled = true
command = ""

# Disabled in default 3-runner topology. Worker finalizer's shell sanity
# gate (zero-diff + verify command re-run) replaces the redundant verifier
# LLM that was averaging ~28K output tokens per idle tick. Re-enable only
# if a project needs an independent compatibility-verification lane that
# is path-disjoint from the worker.
[[runners]]
id = "verifier"
role = "verifier"
agent = "claude"
model = "sonnet-4.6"
reasoning = "medium"
mode = "loop"
interval_seconds = 1800
enabled = false
realtime_enabled = false
command = ""
