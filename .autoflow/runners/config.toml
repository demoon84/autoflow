# Autoflow runner configuration.
#
# Two-runner topology (post-refactor 2026-04-27):
#   planner-1 : Plan AI — backlog/PRD → todo, reject → todo (auto-replan).
#   owner-1   : Impl AI — todo → inprogress (worktree) → verify → merge → done.
# Wiki rebuild is invoked one-shot from owner-1 right after each merge,
# so no persistent wiki/coordinator runner is needed.

[[runners]]
id = "planner-1"
role = "planner"
agent = "claude"
model = "opus"
reasoning = "high"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "owner-1"
role = "ticket-owner"
agent = "claude"
model = "opus"
reasoning = "high"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""
