# Autoflow runner configuration.
#
# Three-runner topology (refactor 2026-04-27):
#   planner-1 : Plan AI — backlog/PRD → todo, reject → todo (auto-replan).
#   owner-1   : Impl AI — todo → inprogress (worktree) → verify → merge → done.
#   wiki-1    : Wiki AI — periodically refreshes .autoflow/wiki/ when
#               tickets/done or tickets/reject change. Path-disjoint from
#               Plan AI and Impl AI so it never causes worktree/merge
#               conflicts.
# Impl AI still runs deterministic update-wiki.sh inline at merge time so
# the wiki has a fresh baseline; wiki-1 layers AI synthesis on top.

[[runners]]
id = "planner-1"
role = "planner"
agent = "codex"
model = "gpt-5.5"
reasoning = "xhigh"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "self-improve-1"
role = "self-improve"
agent = "shell"
model = ""
reasoning = ""
mode = "one-shot"
interval_seconds = 1800
enabled = false
max_duration_seconds = 10800
max_ticks = 6
command = ""

[[runners]]
id = "owner-1"
role = "ticket-owner"
agent = "codex"
model = "gpt-5.5"
reasoning = "medium"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "wiki-1"
role = "wiki-maintainer"
agent = "codex"
model = "gpt-5.5"
reasoning = "medium"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""
