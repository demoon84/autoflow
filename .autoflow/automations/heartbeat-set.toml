format = 1
kind = "autoflow_heartbeat_set"
set_name = "Autoflow Default Set"
target_thread_id = "REPLACE_WITH_TARGET_THREAD_ID"
board_root = ".autoflow/"

# Three-runner topology: Plan AI + Impl AI + Wiki AI.
# Plan AI processes backlog/reject into todo. Impl AI claims todo and runs
# implementation, verification, and inline merge. Wiki AI periodically
# refreshes .autoflow/wiki/ from done/ + reject/, layering AI synthesis on
# top of the deterministic update-wiki.sh that Impl AI runs at merge time.
# Path-disjoint set so concurrent ticks never produce merge conflicts.
owner_workers = ["owner-1"]
planner_workers = ["planner-1"]
wiki_workers = ["wiki-1"]
todo_workers = []
verifier_workers = []
merge_workers = []

execution_pool = ""
verifier_pool = ""
max_execution_load_per_worker = 1

owner_template = "automations/templates/ticket-owner-heartbeat.template.toml"
plan_template = "automations/templates/plan-heartbeat.template.toml"
todo_template = "automations/templates/todo-heartbeat.template.toml"
verifier_template = "automations/templates/verifier-heartbeat.template.toml"

# Per-worker Codex thread_id override. Each entry binds one worker to one
# conversation. Workers not listed here fall back to the top-level
# target_thread_id. Values starting with REPLACE_WITH_ are treated as
# missing at render time.
[thread_ids]
planner-1 = "REPLACE_WITH_PLANNER_1_THREAD_ID"
owner-1 = "REPLACE_WITH_OWNER_1_THREAD_ID"
wiki-1 = "REPLACE_WITH_WIKI_1_THREAD_ID"
[notes]
edit_before_render = "Replace target_thread_id (fallback) and each [thread_ids] entry with real Codex thread ids before running autoflow render-heartbeats."
topology_rule = "Three-runner model: planner_workers=[\"planner-1\"], owner_workers=[\"owner-1\"], wiki_workers=[\"wiki-1\"]. Scale only after profiling shows the pipeline is starved."
trigger_rule = "All three heartbeats keep running until the user explicitly says stop."
wiki_rule = "Impl AI's finish-ticket-owner pass runs the deterministic update-wiki.sh inline so the wiki has a fresh baseline immediately. wiki-1 ticks every minute on top of that to layer AI synthesis (autoflow wiki query --synth, autoflow wiki lint --semantic) when tickets/done or tickets/reject changes."
