# Autoflow runner configuration.
#
# Default 3-runner topology (refactor 2026-04-27):
#   planner : Planner AI — backlog/PRD → todo, reject → todo
#               (auto-replan), and markdown recovery for stalled/blocked work.
#   worker   : Impl AI — todo → inprogress (worktree) → verify → merge → done.
#   wiki    : Wiki AI — periodically refreshes wiki/ when tickets/done or
#               tickets/reject change. Path-disjoint from Planner AI and
#               Impl AI so it never causes worktree/merge conflicts.
# Wiki AI owns material baseline refresh and AI synthesis. Impl AI finalizers
# do not call update-wiki.sh or stage wiki/.
#
# Change agent/model fields to claude, opencode, gemini, shell, or a custom
# command when Codex CLI is not the desired local runner.
#
# Trial `self-improve-1` runner is kept reachable as an opt-in experiment —
# it ships disabled by default.
#
# Legacy `coordinator-1` is no longer scaffolded. Existing boards that opted
# into it keep working (the role identifier is still accepted), and new
# installs can opt in with `autoflow runners add coordinator-1 coordinator`.

[[runners]]
id = "planner"
role = "planner"
agent = "codex"
model = ""
reasoning = "low"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "worker"
role = "ticket-owner"
agent = "codex"
model = ""
reasoning = "low"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "wiki"
role = "wiki-maintainer"
agent = "codex"
model = ""
reasoning = "low"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "self-improve-1"
role = "self-improve"
agent = "shell"
model = ""
reasoning = ""
mode = "one-shot"
interval_seconds = 1800
enabled = false
max_duration_seconds = 10800
max_ticks = 6
command = ""
