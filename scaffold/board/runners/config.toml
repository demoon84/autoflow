# Autoflow runner configuration.
#
# Ships with a fixed set of four ticket-owner AIs plus the system roles
# (merge-bot, wiki-maintainer) the runtime depends on. The desktop AI 관리
# page only exposes the ticket-owner runners; add/remove of AIs is disabled
# by design — edit this file directly if a different layout is required.
# Change agent/model fields to claude, opencode, gemini, shell, or a custom
# command when Codex CLI is not the desired local runner.

[[runners]]
id = "owner-1"
role = "ticket-owner"
agent = "codex"
model = ""
reasoning = ""
mode = "one-shot"
interval_seconds = 60
enabled = true
command = ""

