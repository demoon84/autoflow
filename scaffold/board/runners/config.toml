# Autoflow runner configuration.
#
# Ships with a fixed set of three ticket-owner AIs plus the coordinator system
# role. The coordinator also serves wiki-bot turns when derived wiki synthesis
# or semantic lint needs an adapter. The desktop AI 관리 page only exposes the
# ticket-owner runners; add/remove of AIs is disabled by design — edit this file
# directly if a different layout is required.
# Change agent/model fields to claude, opencode, gemini, shell, or a custom
# command when Codex CLI is not the desired local runner.

[[runners]]
id = "owner-1"
role = "ticket-owner"
agent = "codex"
model = ""
reasoning = ""
mode = "loop"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "owner-2"
role = "ticket-owner"
agent = "codex"
model = ""
reasoning = ""
mode = "one-shot"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "owner-3"
role = "ticket-owner"
agent = "codex"
model = ""
reasoning = ""
mode = "one-shot"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "coordinator-1"
role = "coordinator"
agent = "codex"
model = "gpt-5.5"
reasoning = "xhigh"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "self-improve-1"
role = "self-improve"
agent = "shell"
model = ""
reasoning = ""
mode = "one-shot"
interval_seconds = 1800
enabled = false
max_duration_seconds = 10800
max_ticks = 6
command = ""
