# Autoflow runner configuration.
#
# Default 3-runner topology (refactor 2026-05-07):
#   planner : Planner AI — promotes tickets/inbox/ orders + tickets/backlog/
#               PRDs into tickets/todo/ work. Worker fail re-emits inbox retry
#               orders that planner re-plans like any other order — there is
#               no separate reject queue.
#   worker  : Impl AI — todo claim → worktree create → code edit → finalizer
#               sanity gate (git diff ≥ 1 + every Done When item checked) →
#               master merge → worktree delete. Atomic cycle, single live
#               worktree at a time.
#   wiki    : Wiki AI — refreshes wiki/ when tickets/done/ or wiki/ source
#               changes. Path-disjoint from planner/worker.
#
# Change agent/model fields to claude, opencode, gemini, shell, or a custom
# command when Codex CLI is not the desired local runner.
#
# Trial `self-improve-1` runner is kept reachable as an opt-in experiment —
# it ships disabled by default.
#
# Legacy `coordinator-1` is no longer scaffolded. Existing boards that opted
# into it keep working (the role identifier is still accepted), and new
# installs can opt in with `autoflow runners add coordinator-1 coordinator`.

[[runners]]
id = "planner"
role = "planner"
agent = "codex"
model = ""
reasoning = "low"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "worker"
role = "ticket-owner"
agent = "codex"
model = ""
reasoning = "low"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "wiki"
role = "wiki-maintainer"
agent = "codex"
model = ""
reasoning = "low"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "self-improve-1"
role = "self-improve"
agent = "shell"
model = ""
reasoning = ""
mode = "one-shot"
interval_seconds = 1800
enabled = false
max_duration_seconds = 10800
max_ticks = 6
command = ""
