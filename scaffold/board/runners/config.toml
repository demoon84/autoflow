# Autoflow runner configuration.
#
# Default 4-runner topology:
#   planner : Planner AI — promotes tickets/order/ orders + tickets/prd/
#               PRDs into tickets/todo/ work. Worker fail re-emits order retry
#               orders that planner re-plans like any other order — there is
#               no separate reject queue.
#   worker  : Impl AI — todo claim → worktree create → code edit → local
#               verification evidence → finalizer mechanical gate. Single
#               live worktree at a time.
#   verifier: Verifier AI — semantic review of finished diff vs Title/Goal/
#               Done When before done routing.
#   wiki    : Wiki AI — refreshes wiki/ when tickets/done/ or wiki/ source
#               changes. Path-disjoint from planner/worker.
#
# Change agent/model fields to claude, opencode, gemini, shell, or a custom
# command when Codex CLI is not the desired local runner.
#
# Trial `self-improve-1` runner is kept reachable as an opt-in experiment —
# it ships disabled by default.
#
# Legacy `coordinator-1` is no longer scaffolded. Existing boards that opted
# into it keep working (the role identifier is still accepted), and new
# installs can opt in with `autoflow runners add coordinator-1 coordinator`.

[[runners]]
id = "planner"
role = "planner"
agent = "codex"
model = ""
reasoning = "low"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "worker"
role = "worker"
agent = "codex"
model = ""
reasoning = "low"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "verifier"
role = "verifier"
agent = "codex"
model = ""
reasoning = "low"
mode = "loop"
interval_seconds = 300
enabled = true
command = ""

[[runners]]
id = "wiki"
role = "wiki-maintainer"
agent = "codex"
model = ""
reasoning = "low"
mode = "loop"
interval_seconds = 60
enabled = true
command = ""

[[runners]]
id = "self-improve-1"
role = "self-improve"
agent = "shell"
model = ""
reasoning = ""
mode = "one-shot"
interval_seconds = 1800
enabled = false
max_duration_seconds = 10800
max_ticks = 6
command = ""
