format = 1
kind = "autoflow_heartbeat_set"
set_name = "{{SET_NAME}}"
target_thread_id = "{{THREAD_ID}}"
board_root = "{{BOARD_DIR}}/"

# Three-runner topology: Plan AI + Impl AI + Wiki AI.
# Plan AI processes backlog/reject into todo. Impl AI claims todo and runs
# implementation, verification, and inline merge. Wiki AI periodically
# inspects done/ + reject/ and calls wiki update only when content changes.
# Path-disjoint set so concurrent ticks never produce merge conflicts.
owner_workers = ["worker"]
planner_workers = ["planner"]
wiki_workers = ["wiki"]

# Legacy role-pipeline workers. Keep these empty for the default
# 3-runner topology. Populate only if you intentionally opt into the
# legacy planner/todo/verifier or merge-bot pipeline.
todo_workers = []
verifier_workers = []
merge_workers = []

execution_pool = ""
verifier_pool = ""
max_execution_load_per_worker = 1

owner_template = "automations/templates/ticket-owner-heartbeat.template.toml"
plan_template = "automations/templates/plan-heartbeat.template.toml"
todo_template = "automations/templates/todo-heartbeat.template.toml"
verifier_template = "automations/templates/verifier-heartbeat.template.toml"

# Per-worker Codex thread_id override. A worker present here is rendered with
# its own target_thread_id. Workers without an entry fall back to the
# top-level target_thread_id above.
[thread_ids]
planner = "{{PLANNER_THREAD_ID}}"
worker = "{{WORKER_THREAD_ID}}"
wiki = "{{WIKI_THREAD_ID}}"

[notes]
topology_rule = "Three-runner model: planner_workers=[\"planner\"], owner_workers=[\"worker\"], wiki_workers=[\"wiki\"]. Scale only after profiling shows the pipeline is starved."
idle_rule = "Always-on workers should use AUTOFLOW_BACKGROUND=1 so empty wake-ups return status=idle."
ownership_rule = "Every live worker id should be unique. Impl AI (worker) owns one active ticket end-to-end."
thread_binding_rule = "One conversation per worker: fill every [thread_ids] entry with a unique Codex thread id. Shared mode: leave [thread_ids] empty and set target_thread_id only."
trigger_rule = "All three heartbeats should keep running until the user explicitly says stop."
wiki_rule = "Wiki AI owns wiki updates. Impl AI does not call update-wiki.sh or stage .autoflow/wiki during ticket completion; wiki inspects source changes and calls autoflow wiki update only for material baseline drift, with check-only state in runners/state/wiki-baseline.history."
legacy_rule = "merge_workers, todo_workers, and verifier_workers are kept for role-pipeline compatibility; the 3-runner topology leaves all three empty because Impl AI absorbs todo claim, verification, and inline merge."
